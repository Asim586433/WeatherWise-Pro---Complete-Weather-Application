<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherWise - Real-Time Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Styles */
        header {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Search Section */
        .search-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 250px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            align-self: flex-end;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* Locations Section */
        .locations-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .locations-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .locations-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .location-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .location-item:hover {
            transform: scale(1.05);
        }

        .location-item.active {
            border: 3px solid #667eea;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
        }

        .remove-location {
            color: #ff4444;
            cursor: pointer;
            font-weight: bold;
            padding: 0 5px;
        }

        .remove-location:hover {
            color: #cc0000;
        }

        /* Weather Display */
        .weather-display {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .current-weather {
            text-align: center;
            margin-bottom: 30px;
        }

        .weather-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .weather-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .temperature {
            font-size: 4em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 1.5em;
            color: #666;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .detail-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .detail-value {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
        }

        /* Forecast Section */
        .forecast-section {
            margin-top: 30px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .forecast-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .forecast-day {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
        }

        .forecast-icon {
            width: 50px;
            height: 50px;
            margin: 10px auto;
        }

        .forecast-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .forecast-temp {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin: 10px 0;
        }

        /* Error Message */
        .error-message {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .search-box {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ WeatherWise</h1>
            <p>Real-time weather updates for your favorite locations</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-box">
                <div class="input-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Enter city name" value="London">
                </div>
                <div class="input-group">
                    <label for="country">Country Code (optional)</label>
                    <input type="text" id="country" placeholder="e.g., US, UK" maxlength="2">
                </div>
                <button class="btn" id="searchBtn">Get Weather</button>
                <button class="btn btn-secondary" id="addLocationBtn">➕ Add to Saved</button>
            </div>
        </section>

        <!-- Saved Locations -->
        <section class="locations-section">
            <div class="locations-header">
                <h2>📍 Saved Locations</h2>
                <button class="btn btn-secondary" id="refreshAllBtn">🔄 Refresh All</button>
            </div>
            <div class="locations-list" id="locationsList">
                <!-- Locations will be added here dynamically -->
            </div>
        </section>

        <!-- Weather Display -->
        <section class="weather-display" id="weatherDisplay">
            <div class="current-weather">
                <div class="weather-icon" id="weatherIcon">
                    <img src="https://openweathermap.org/img/wn/01d@2x.png" alt="Weather icon">
                </div>
                <div class="temperature" id="temperature">--°C</div>
                <div class="weather-description" id="weatherDescription">--</div>
                <div id="locationName" style="font-size: 1.2em; color: #666;">Loading...</div>
            </div>

            <div class="weather-details">
                <div class="detail-card">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value" id="feelsLike">--°C</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity">--%</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="windSpeed">-- m/s</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure">-- hPa</div>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <div class="forecast-section">
                <h2 style="text-align: center; margin-bottom: 20px;">5-Day Forecast</h2>
                <div class="forecast-grid" id="forecastGrid">
                    <!-- Forecast cards will be added here -->
                </div>
            </div>
        </section>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <!-- Loading -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: white;">Loading weather data...</p>
        </div>
    </div>

    <script>
        // API Configuration
        const API_KEY = 'YOUR_API_KEY'; // Replace with actual API key
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';

        // State management
        let savedLocations = JSON.parse(localStorage.getItem('savedLocations')) || ['London,UK'];
        let currentLocation = savedLocations[0] || 'London,UK';

        // DOM Elements
        const cityInput = document.getElementById('city');
        const countryInput = document.getElementById('country');
        const searchBtn = document.getElementById('searchBtn');
        const addLocationBtn = document.getElementById('addLocationBtn');
        const refreshAllBtn = document.getElementById('refreshAllBtn');
        const locationsList = document.getElementById('locationsList');
        const weatherDisplay = document.getElementById('weatherDisplay');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');

        // Weather display elements
        const weatherIcon = document.querySelector('#weatherIcon img');
        const temperature = document.getElementById('temperature');
        const weatherDescription = document.getElementById('weatherDescription');
        const locationName = document.getElementById('locationName');
        const feelsLike = document.getElementById('feelsLike');
        const humidity = document.getElementById('humidity');
        const windSpeed = document.getElementById('windSpeed');
        const pressure = document.getElementById('pressure');
        const forecastGrid = document.getElementById('forecastGrid');

        // Initialize the app
        function init() {
            renderSavedLocations();
            fetchWeatherData(currentLocation);
        }

        // Fetch weather data
        async function fetchWeatherData(location) {
            showLoading(true);
            hideError();

            try {
                const [city, country] = location.split(',');
                const query = country ? `${city},${country}` : city;
                
                // Fetch current weather
                const currentResponse = await fetch(
                    `${BASE_URL}/weather?q=${query}&units=metric&appid=${API_KEY}`
                );
                
                if (!currentResponse.ok) {
                    throw new Error('Location not found');
                }
                
                const currentData = await currentResponse.json();
                
                // Fetch 5-day forecast
                const forecastResponse = await fetch(
                    `${BASE_URL}/forecast?q=${query}&units=metric&appid=${API_KEY}`
                );
                const forecastData = await forecastResponse.json();
                
                updateCurrentWeather(currentData);
                updateForecast(forecastData);
                updateLocationName(currentData);
                
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        // Update current weather display
        function updateCurrentWeather(data) {
            temperature.textContent = `${Math.round(data.main.temp)}°C`;
            weatherDescription.textContent = data.weather[0].description;
            feelsLike.textContent = `${Math.round(data.main.feels_like)}°C`;
            humidity.textContent = `${data.main.humidity}%`;
            windSpeed.textContent = `${data.wind.speed} m/s`;
            pressure.textContent = `${data.main.pressure} hPa`;
            
            const iconCode = data.weather[0].icon;
            weatherIcon.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
        }

        // Update location name
        function updateLocationName(data) {
            locationName.textContent = `${data.name}, ${data.sys.country}`;
        }

        // Update forecast
        function updateForecast(data) {
            forecastGrid.innerHTML = '';
            
            // Get one forecast per day (every 8th item for 3-hour intervals)
            const dailyForecasts = data.list.filter((item, index) => index % 8 === 0);
            
            dailyForecasts.slice(0, 5).forEach(day => {
                const date = new Date(day.dt * 1000);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                
                const forecastCard = document.createElement('div');
                forecastCard.className = 'forecast-card';
                forecastCard.innerHTML = `
                    <div class="forecast-day">${dayName}</div>
                    <div class="forecast-icon">
                        <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}.png" alt="Weather icon">
                    </div>
                    <div class="forecast-temp">${Math.round(day.main.temp)}°C</div>
                    <div style="font-size: 0.8em; color: #666;">${day.weather[0].description}</div>
                `;
                
                forecastGrid.appendChild(forecastCard);
            });
        }

        // Render saved locations
        function renderSavedLocations() {
            locationsList.innerHTML = '';
            
            savedLocations.forEach(location => {
                const locationItem = document.createElement('div');
                locationItem.className = `location-item ${location === currentLocation ? 'active' : ''}`;
                
                const [city, country] = location.split(',');
                locationItem.innerHTML = `
                    <span>${city}${country ? `, ${country}` : ''}</span>
                    <span class="remove-location" data-location="${location}">×</span>
                `;
                
                locationItem.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('remove-location')) {
                        currentLocation = location;
                        renderSavedLocations();
                        fetchWeatherData(location);
                    }
                });
                
                locationsList.appendChild(locationItem);
            });
            
            // Add remove functionality
            document.querySelectorAll('.remove-location').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const locationToRemove = e.target.dataset.location;
                    removeLocation(locationToRemove);
                });
            });
        }

        // Add new location
        function addLocation() {
            const city = cityInput.value.trim();
            const country = countryInput.value.trim().toUpperCase();
            
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            
            const locationString = country ? `${city},${country}` : city;
            
            if (savedLocations.includes(locationString)) {
                showError('Location already saved');
                return;
            }
            
            // Verify location exists before saving
            fetch(`${BASE_URL}/weather?q=${locationString}&appid=${API_KEY}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Location not found');
                    }
                    return response.json();
                })
                .then(() => {
                    savedLocations.push(locationString);
                    localStorage.setItem('savedLocations', JSON.stringify(savedLocations));
                    renderSavedLocations();
                    cityInput.value = '';
                    countryInput.value = '';
                    showError('Location added successfully!', 'success');
                })
                .catch(error => {
                    showError(error.message);
                });
        }

        // Remove location
        function removeLocation(location) {
            savedLocations = savedLocations.filter(l => l !== location);
            localStorage.setItem('savedLocations', JSON.stringify(savedLocations));
            
            if (currentLocation === location) {
                currentLocation = savedLocations[0] || 'London,UK';
                fetchWeatherData(currentLocation);
            }
            
            renderSavedLocations();
        }

        // Refresh all locations
        async function refreshAllLocations() {
            showLoading(true);
            
            for (const location of savedLocations) {
                await fetchWeatherData(location);
                await new Promise(resolve => setTimeout(resolve, 1000)); // Rate limiting
            }
            
            showLoading(false);
            showError('All locations refreshed!', 'success');
        }

        // Show/hide loading
        function showLoading(show) {
            loading.style.display = show ? 'block' : 'none';
            weatherDisplay.style.opacity = show ? '0.5' : '1';
        }

        // Show error message
        function showError(message, type = 'error') {
            errorMessage.style.display = 'block';
            errorMessage.textContent = message;
            errorMessage.style.background = type === 'error' ? '#ff4444' : '#00C851';
            
            setTimeout(() => {
                hideError();
            }, 5000);
        }

        // Hide error message
        function hideError() {
            errorMessage.style.display = 'none';
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            const country = countryInput.value.trim().toUpperCase();
            
            if (city) {
                const location = country ? `${city},${country}` : city;
                currentLocation = location;
                fetchWeatherData(location);
            } else {
                showError('Please enter a city name');
            }
        });

        addLocationBtn.addEventListener('click', addLocation);

        refreshAllBtn.addEventListener('click', refreshAllLocations);

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });

        // Initialize the app
        init();
    </script>
</body>
</html>
