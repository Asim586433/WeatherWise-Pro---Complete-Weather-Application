<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherWise Pro - Complete Weather Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-color: #00C851;
            --error-color: #ff4444;
            --text-primary: #333;
            --text-secondary: #666;
            --bg-light: #f5f5f5;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        body {
            background: var(--primary-gradient);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.cold-bg {
            background: linear-gradient(135deg, #2c3e50, #3498db);
        }

        body.warm-bg {
            background: linear-gradient(135deg, #f7971e, #ffd200);
        }

        body.hot-bg {
            background: linear-gradient(135deg, #ff6b6b, #ee5253);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Styles */
        header {
            text-align: center;
            color: var(--white);
            padding: 40px 20px;
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: slideInDown 0.5s ease;
        }

        @keyframes slideInDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        header p {
            font-size: 1.3em;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .date-time {
            font-size: 1.2em;
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            margin-top: 10px;
        }

        /* Main Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Sidebar */
        .sidebar {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            height: fit-content;
        }

        .sidebar h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        /* Search Form */
        .search-form {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s;
            background: var(--white);
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: var(--error-color);
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Buttons */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--primary-gradient);
            color: var(--white);
            width: 100%;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255,255,255,0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .btn:active::after {
            animation: ripple 0.3s ease-out;
        }

        @keyframes ripple {
            0% { transform: scale(0, 0); opacity: 0.5; }
            100% { transform: scale(20, 20); opacity: 0; }
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--secondary-gradient);
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.9em;
        }

        /* Locations List */
        .locations-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .location-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .location-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .location-item.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            font-weight: 600;
        }

        .location-info {
            flex: 1;
        }

        .location-temp {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        .remove-location {
            color: var(--error-color);
            cursor: pointer;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .remove-location:hover {
            background: var(--error-color);
            color: var(--white);
        }

        /* Main Content */
        .main-content {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        /* Current Weather */
        .current-weather {
            text-align: center;
            margin-bottom: 40px;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .weather-icon {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .weather-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .temperature {
            font-size: 5em;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            line-height: 1;
        }

        .weather-description {
            font-size: 1.8em;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .location-name {
            font-size: 1.3em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Weather Details Grid */
        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .detail-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
            animation: fadeInUp 0.5s ease;
            animation-fill-mode: both;
        }

        .detail-card:nth-child(1) { animation-delay: 0.1s; }
        .detail-card:nth-child(2) { animation-delay: 0.2s; }
        .detail-card:nth-child(3) { animation-delay: 0.3s; }
        .detail-card:nth-child(4) { animation-delay: 0.4s; }
        .detail-card:nth-child(5) { animation-delay: 0.5s; }
        .detail-card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .detail-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .detail-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .detail-label {
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-size: 1em;
        }

        .detail-value {
            font-size: 1.8em;
            font-weight: 600;
            color: var(--text-primary);
        }

        .detail-unit {
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-left: 5px;
        }

        /* Forecast Section */
        .forecast-section {
            margin-top: 40px;
        }

        .forecast-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-primary);
            font-size: 2em;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .forecast-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
            animation: slideInUp 0.5s ease;
            animation-fill-mode: both;
        }

        .forecast-card:nth-child(1) { animation-delay: 0.1s; }
        .forecast-card:nth-child(2) { animation-delay: 0.2s; }
        .forecast-card:nth-child(3) { animation-delay: 0.3s; }
        .forecast-card:nth-child(4) { animation-delay: 0.4s; }
        .forecast-card:nth-child(5) { animation-delay: 0.5s; }

        @keyframes slideInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .forecast-card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .forecast-day {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .forecast-icon {
            width: 70px;
            height: 70px;
            margin: 15px auto;
        }

        .forecast-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .forecast-temp {
            font-size: 1.5em;
            font-weight: 600;
            color: var(--text-primary);
            margin: 10px 0;
        }

        .forecast-desc {
            font-size: 0.9em;
            color: var(--text-secondary);
            text-transform: capitalize;
        }

        /* Chart Section */
        .chart-section {
            margin-top: 40px;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
        }

        .chart-container {
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }

        .temp-bars {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 150px;
            gap: 10px;
        }

        .temp-bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .temp-bar {
            width: 100%;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 10px 10px 0 0;
            transition: height 1s ease;
            min-height: 30px;
        }

        .temp-bar-label {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        /* Loading Spinner */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--white);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert Message */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: var(--white);
            font-weight: 600;
            display: none;
            animation: slideInRight 0.3s ease;
            z-index: 1001;
            box-shadow: var(--shadow);
        }

        .alert.success { background: var(--success-color); }
        .alert.error { background: var(--error-color); }
        .alert.info { background: #33b5e5; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: 2;
            }

            .main-content {
                order: 1;
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5em;
            }

            .temperature {
                font-size: 3.5em;
            }

            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .forecast-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .detail-value {
                font-size: 1.3em;
            }
        }

        @media (max-width: 480px) {
            .weather-details {
                grid-template-columns: 1fr;
            }

            .forecast-grid {
                grid-template-columns: 1fr;
            }

            .date-time {
                font-size: 1em;
            }
        }

        /* Utility Classes */
        .text-center { text-align: center; }
        .mt-20 { margin-top: 20px; }
        .mb-20 { margin-bottom: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ WeatherWise Pro</h1>
            <p>Your Complete Weather Solution</p>
            <div class="date-time" id="currentDateTime"></div>
        </header>

        <div class="dashboard">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h2>🔍 Search Weather</h2>
                <div class="search-form">
                    <div class="form-group">
                        <label for="city">City Name</label>
                        <input type="text" id="city" placeholder="e.g., London" value="London">
                    </div>
                    <div class="form-group">
                        <label for="country">Country Code (optional)</label>
                        <input type="text" id="country" placeholder="e.g., US, UK" maxlength="2">
                    </div>
                    <button class="btn" id="searchBtn">
                        <span>🔍 Get Weather</span>
                    </button>
                    <button class="btn btn-secondary" id="addLocationBtn">
                        <span>➕ Save Location</span>
                    </button>
                    <button class="btn btn-small" id="useCurrentLocationBtn">
                        <span>📍 Use My Location</span>
                    </button>
                </div>

                <h2>📌 Saved Locations</h2>
                <button class="btn btn-small btn-secondary" id="refreshAllBtn">
                    <span>🔄 Refresh All</span>
                </button>
                <div class="locations-list" id="locationsList">
                    <!-- Locations will be added here -->
                </div>

                <h2 class="mt-20">⚙️ Settings</h2>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="unitToggle" checked> 
                        Use Celsius (°C)
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="autoRefresh"> 
                        Auto-refresh (30s)
                    </label>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Current Weather -->
                <div class="current-weather">
                    <div class="weather-icon" id="weatherIcon">
                        <img src="https://openweathermap.org/img/wn/01d@4x.png" alt="Weather icon">
                    </div>
                    <div class="temperature" id="temperature">--°C</div>
                    <div class="weather-description" id="weatherDescription">--</div>
                    <div class="location-name" id="locationName">Loading...</div>
                </div>

                <!-- Weather Details -->
                <div class="weather-details">
                    <div class="detail-card">
                        <div class="detail-icon">🌡️</div>
                        <div class="detail-label">Feels Like</div>
                        <div class="detail-value" id="feelsLike">--<span class="detail-unit">°C</span></div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">💧</div>
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value" id="humidity">--<span class="detail-unit">%</span></div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">💨</div>
                        <div class="detail-label">Wind Speed</div>
                        <div class="detail-value" id="windSpeed">--<span class="detail-unit">m/s</span></div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">📊</div>
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value" id="pressure">--<span class="detail-unit">hPa</span></div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">👁️</div>
                        <div class="detail-label">Visibility</div>
                        <div class="detail-value" id="visibility">--<span class="detail-unit">km</span></div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">☀️</div>
                        <div class="detail-label">UV Index</div>
                        <div class="detail-value" id="uvIndex">--</div>
                    </div>
                </div>

                <!-- 5-Day Forecast -->
                <div class="forecast-section">
                    <h2>📅 5-Day Forecast</h2>
                    <div class="forecast-grid" id="forecastGrid">
                        <!-- Forecast cards will be added here -->
                    </div>
                </div>

                <!-- Temperature Trend Chart -->
                <div class="chart-section">
                    <h2>📈 Temperature Trend</h2>
                    <div class="chart-container">
                        <div class="temp-bars" id="tempBars">
                            <!-- Bars will be added here -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Alert Message -->
    <div class="alert" id="alert"></div>

    <script>
        // API Configuration - Using free API for demo
        const API_KEY = 'bd5e378503939ddaee76f12ad7a97608'; // Demo API key - rate limited
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';

        // State Management
        let savedLocations = JSON.parse(localStorage.getItem('weatherLocations')) || [
            'London,UK',
            'New York,US',
            'Tokyo,JP',
            'Sydney,AU'
        ];
        let currentLocation = savedLocations[0] || 'London,UK';
        let useCelsius = localStorage.getItem('useCelsius') !== 'false';
        let autoRefresh = false;
        let refreshInterval;
        let weatherCache = new Map();

        // DOM Elements
        const elements = {
            city: document.getElementById('city'),
            country: document.getElementById('country'),
            searchBtn: document.getElementById('searchBtn'),
            addLocationBtn: document.getElementById('addLocationBtn'),
            useCurrentLocationBtn: document.getElementById('useCurrentLocationBtn'),
            refreshAllBtn: document.getElementById('refreshAllBtn'),
            locationsList: document.getElementById('locationsList'),
            weatherIcon: document.querySelector('#weatherIcon img'),
            temperature: document.getElementById('temperature'),
            weatherDescription: document.getElementById('weatherDescription'),
            locationName: document.getElementById('locationName'),
            feelsLike: document.getElementById('feelsLike'),
            humidity: document.getElementById('humidity'),
            windSpeed: document.getElementById('windSpeed'),
            pressure: document.getElementById('pressure'),
            visibility: document.getElementById('visibility'),
            uvIndex: document.getElementById('uvIndex'),
            forecastGrid: document.getElementById('forecastGrid'),
            tempBars: document.getElementById('tempBars'),
            loading: document.getElementById('loading'),
            alert: document.getElementById('alert'),
            unitToggle: document.getElementById('unitToggle'),
            autoRefresh: document.getElementById('autoRefresh'),
            currentDateTime: document.getElementById('currentDateTime')
        };

        // Initialize the app
        function init() {
            elements.unitToggle.checked = useCelsius;
            loadSettings();
            renderSavedLocations();
            fetchWeatherData(currentLocation);
            updateDateTime();
            setInterval(updateDateTime, 1000);
            setupEventListeners();
        }

        // Setup event listeners
        function setupEventListeners() {
            elements.searchBtn.addEventListener('click', handleSearch);
            elements.addLocationBtn.addEventListener('click', addLocation);
            elements.useCurrentLocationBtn.addEventListener('click', getCurrentLocation);
            elements.refreshAllBtn.addEventListener('click', refreshAllLocations);
            elements.unitToggle.addEventListener('change', toggleUnit);
            elements.autoRefresh.addEventListener('change', toggleAutoRefresh);
            
            elements.city.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearch();
            });
        }

        // Load settings from localStorage
        function loadSettings() {
            autoRefresh = localStorage.getItem('autoRefresh') === 'true';
            elements.autoRefresh.checked = autoRefresh;
            if (autoRefresh) startAutoRefresh();
        }

        // Toggle temperature unit
        function toggleUnit() {
            useCelsius = elements.unitToggle.checked;
            localStorage.setItem('useCelsius', useCelsius);
            fetchWeatherData(currentLocation);
        }

        // Toggle auto refresh
        function toggleAutoRefresh() {
            autoRefresh = elements.autoRefresh.checked;
            localStorage.setItem('autoRefresh', autoRefresh);
            if (autoRefresh) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        // Start auto refresh
        function startAutoRefresh() {
            stopAutoRefresh();
            refreshInterval = setInterval(() => {
                fetchWeatherData(currentLocation);
            }, 30000);
        }

        // Stop auto refresh
        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        }

        // Update date and time
        function updateDateTime() {
            const now = new Date();
            elements.currentDateTime.textContent = now.toLocaleString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        // Handle search
        function handleSearch() {
            const city = elements.city.value.trim();
            const country = elements.country.value.trim().toUpperCase();
            
            if (!city) {
                showAlert('Please enter a city name', 'error');
                elements.city.classList.add('error');
                setTimeout(() => elements.city.classList.remove('error'), 500);
                return;
            }
            
            const location = country ? `${city},${country}` : city;
            currentLocation = location;
            fetchWeatherData(location);
        }

        // Get current location
        function getCurrentLocation() {
            showLoading(true);
            
            if (!navigator.geolocation) {
                showAlert('Geolocation is not supported by your browser', 'error');
                showLoading(false);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    try {
                        const { latitude, longitude } = position.coords;
                        const response = await fetch(
                            `${BASE_URL}/weather?lat=${latitude}&lon=${longitude}&appid=${API_KEY}`
                        );
                        const data = await response.json();
                        const location = `${data.name},${data.sys.country}`;
                        currentLocation = location;
                        elements.city.value = data.name;
                        elements.country.value = data.sys.country;
                        fetchWeatherData(location);
                    } catch (error) {
                        showAlert('Failed to get location weather', 'error');
                        showLoading(false);
                    }
                },
                (error) => {
                    showAlert('Failed to get your location: ' + error.message, 'error');
                    showLoading(false);
                }
            );
        }

        // Fetch weather data
        async function fetchWeatherData(location) {
            showLoading(true);
            hideAlert();

            try {
                // Check cache first (5 minutes TTL)
                const cached = weatherCache.get(location);
                if (cached && Date.now() - cached.timestamp < 300000) {
                    updateWeatherDisplay(cached.data);
                    showLoading(false);
                    return;
                }

                const [city, country] = location.split(',');
                const query = country ? `${city},${country}` : city;
                
                // Fetch current weather
                const currentResponse = await fetch(
                    `${BASE_URL}/weather?q=${query}&units=metric&appid=${API_KEY}`
                );
                
                if (!currentResponse.ok) {
                    throw new Error(currentResponse.status === 404 ? 'Location not found' : 'Failed to fetch weather');
                }
                
                const currentData = await currentResponse.json();
                
                // Fetch 5-day forecast
                const forecastResponse = await fetch(
                    `${BASE_URL}/forecast?q=${query}&units=metric&appid=${API_KEY}`
                );
                
                if (!forecastResponse.ok) {
                    throw new Error('Failed to fetch forecast');
                }
                
                const forecastData = await forecastResponse.json();
                
                // Combine data
                const weatherData = {
                    current: currentData,
                    forecast: forecastData
                };
                
                // Update cache
                weatherCache.set(location, {
                    data: weatherData,
                    timestamp: Date.now()
                });
                
                updateWeatherDisplay(weatherData);
                
            } catch (error) {
                showAlert(error.message, 'error');
                console.error('Weather fetch error:', error);
            } finally {
                showLoading(false);
            }
        }

        // Update weather display
        function updateWeatherDisplay(data) {
            const current = data.current;
            
            // Update background based on temperature
            const temp = current.main.temp;
            if (temp < 10) {
                document.body.className = 'cold-bg';
            } else if (temp < 25) {
                document.body.className = 'warm-bg';
            } else {
                document.body.className = 'hot-bg';
            }
            
            // Update current weather
            elements.temperature.innerHTML = `${Math.round(current.main.temp)}°${useCelsius ? 'C' : 'F'}`;
            elements.weatherDescription.textContent = current.weather[0].description;
            elements.locationName.textContent = `${current.name}, ${current.sys.country}`;
            
            const feelsLike = useCelsius ? 
                current.main.feels_like : 
                (current.main.feels_like * 9/5) + 32;
            elements.feelsLike.innerHTML = `${Math.round(feelsLike)}<span class="detail-unit">°${useCelsius ? 'C' : 'F'}</span>`;
            
            elements.humidity.innerHTML = `${current.main.humidity}<span class="detail-unit">%</span>`;
            elements.windSpeed.innerHTML = `${current.wind.speed}<span class="detail-unit">m/s</span>`;
            elements.pressure.innerHTML = `${current.main.pressure}<span class="detail-unit">hPa</span>`;
            
            const visibilityKm = (current.visibility / 1000).toFixed(1);
            elements.visibility.innerHTML = `${visibilityKm}<span class="detail-unit">km</span>`;
            
            // UV Index (simulated for demo)
            const uvIndex = Math.floor(Math.random() * 11);
            elements.uvIndex.textContent = uvIndex;
            
            // Weather icon
            const iconCode = current.weather[0].icon;
            elements.weatherIcon.src = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;
            
            // Update forecast
            updateForecast(data.forecast);
            
            // Update temperature trend chart
            updateTemperatureChart(data.forecast);
            
            // Update saved locations temperatures
            updateSavedLocationsTemperatures();
        }

        // Update forecast
        function updateForecast(forecastData) {
            elements.forecastGrid.innerHTML = '';
            
            // Get one forecast per day
            const dailyForecasts = forecastData.list.filter((item, index) => index % 8 === 0).slice(0, 5);
            
            dailyForecasts.forEach(day => {
                const date = new Date(day.dt * 1000);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const temp = useCelsius ? 
                    day.main.temp : 
                    (day.main.temp * 9/5) + 32;
                
                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="forecast-day">${dayName}</div>
                    <div class="forecast-icon">
                        <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" alt="Weather icon">
                    </div>
                    <div class="forecast-temp">${Math.round(temp)}°${useCelsius ? 'C' : 'F'}</div>
                    <div class="forecast-desc">${day.weather[0].description}</div>
                `;
                
                elements.forecastGrid.appendChild(card);
            });
        }

        // Update temperature chart
        function updateTemperatureChart(forecastData) {
            elements.tempBars.innerHTML = '';
            
            const dailyForecasts = forecastData.list.filter((item, index) => index % 8 === 0).slice(0, 5);
            const maxTemp = Math.max(...dailyForecasts.map(d => d.main.temp));
            
            dailyForecasts.forEach((day, index) => {
                const date = new Date(day.dt * 1000);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const temp = day.main.temp;
                const barHeight = (temp / maxTemp) * 100;
                
                const barItem = document.createElement('div');
                barItem.className = 'temp-bar-item';
                barItem.innerHTML = `
                    <div class="temp-bar" style="height: ${barHeight}%"></div>
                    <div class="temp-bar-label">${Math.round(temp)}°C</div>
                    <div class="temp-bar-label">${dayName}</div>
                `;
                
                elements.tempBars.appendChild(barItem);
            });
        }

        // Update saved locations temperatures
        async function updateSavedLocationsTemperatures() {
            const locationItems = document.querySelectorAll('.location-item');
            
            for (const item of locationItems) {
                const location = item.dataset.location;
                if (location && weatherCache.has(location)) {
                    const data = weatherCache.get(location).data;
                    const temp = Math.round(data.current.main.temp);
                    const tempElement = item.querySelector('.location-temp');
                    if (tempElement) {
                        tempElement.textContent = `${temp}°${useCelsius ? 'C' : 'F'}`;
                    }
                }
            }
        }

        // Render saved locations
        function renderSavedLocations() {
            elements.locationsList.innerHTML = '';
            
            savedLocations.forEach(location => {
                const [city, country] = location.split(',');
                const isActive = location === currentLocation;
                
                const item = document.createElement('div');
                item.className = `location-item ${isActive ? 'active' : ''}`;
                item.dataset.location = location;
                
                // Get cached temperature if available
                let tempText = '';
                if (weatherCache.has(location)) {
                    const data = weatherCache.get(location).data;
                    const temp = Math.round(data.current.main.temp);
                    tempText = `<div class="location-temp">${temp}°${useCelsius ? 'C' : 'F'}</div>`;
                }
                
                item.innerHTML = `
                    <div class="location-info">
                        <strong>${city}</strong>${country ? `, ${country}` : ''}
                        ${tempText}
                    </div>
                    <span class="remove-location" onclick="event.stopPropagation(); removeLocation('${location}')">×</span>
                `;
                
                item.addEventListener('click', () => {
                    currentLocation = location;
                    renderSavedLocations();
                    fetchWeatherData(location);
                });
                
                elements.locationsList.appendChild(item);
            });
        }

        // Add new location
        async function addLocation() {
            const city = elements.city.value.trim();
            const country = elements.country.value.trim().toUpperCase();
            
            if (!city) {
                showAlert('Please enter a city name', 'error');
                return;
            }
            
            const location = country ? `${city},${country}` : city;
            
            if (savedLocations.includes(location)) {
                showAlert('Location already saved', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                // Verify location exists
                const response = await fetch(
                    `${BASE_URL}/weather?q=${location}&appid=${API_KEY}`
                );
                
                if (!response.ok) {
                    throw new Error('Location not found');
                }
                
                const data = await response.json();
                const verifiedLocation = `${data.name},${data.sys.country}`;
                
                savedLocations.push(verifiedLocation);
                localStorage.setItem('weatherLocations', JSON.stringify(savedLocations));
                
                renderSavedLocations();
                elements.city.value = '';
                elements.country.value = '';
                
                showAlert('Location added successfully!', 'success');
                
                // Fetch weather for new location
                fetchWeatherData(verifiedLocation);
                
            } catch (error) {
                showAlert(error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Remove location
        function removeLocation(location) {
            if (savedLocations.length <= 1) {
                showAlert('Cannot remove last location', 'error');
                return;
            }
            
            savedLocations = savedLocations.filter(l => l !== location);
            localStorage.setItem('weatherLocations', JSON.stringify(savedLocations));
            
            if (currentLocation === location) {
                currentLocation = savedLocations[0];
                fetchWeatherData(currentLocation);
            }
            
            renderSavedLocations();
            showAlert('Location removed', 'success');
        }

        // Refresh all locations
        async function refreshAllLocations() {
            showLoading(true);
            
            for (const location of savedLocations) {
                await fetchWeatherData(location);
                await new Promise(resolve => setTimeout(resolve, 1000)); // Rate limiting
            }
            
            showLoading(false);
            showAlert('All locations refreshed!', 'success');
        }

        // Show loading
        function showLoading(show) {
            elements.loading.style.display = show ? 'flex' : 'none';
        }

        // Show alert
        function showAlert(message, type = 'info') {
            elements.alert.textContent = message;
            elements.alert.className = `alert ${type}`;
            elements.alert.style.display = 'block';
            
            setTimeout(hideAlert, 3000);
        }

        // Hide alert
        function hideAlert() {
            elements.alert.style.display = 'none';
        }

        // Initialize the app when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            stopAutoRefresh();
        });
    </script>
</body>
</html>
